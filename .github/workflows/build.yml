name: Build TGProxy for all platforms

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name "TGProxy-win" --add-data "web;web" app.py
      - uses: actions/upload-artifact@v4
        with:
          name: TGProxy-windows
          path: dist/TGProxy-win.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name "TGProxy-linux" --add-data "web:web" app.py
      - run: chmod +x dist/TGProxy-linux
      - uses: actions/upload-artifact@v4
        with:
          name: TGProxy-linux
          path: dist/TGProxy-linux

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name "TGProxy-macos" --add-data "web:web" app.py
      - uses: actions/upload-artifact@v4
        with:
          name: TGProxy-macos
          path: dist/TGProxy-macos
